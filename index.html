<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panell de Sostenibilitat ASIX</title>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-header: #0f172a;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-dark: #3730a3;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
        }

        header {
            background-color: var(--bg-header);
            color: white;
            padding: 3rem 2rem 5rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .container {
            max-width: 1000px;
            margin: -3rem auto 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .grid-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-label {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        select, input[type="number"] {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
        }

        .input-with-suffix {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-with-suffix input {
            padding-right: 2rem;
        }

        .input-with-suffix span {
            position: absolute;
            right: 0.75rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .checkbox-group {
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .checkbox-label {
            display: flex;
            align-items: flex-start;
            font-size: 0.875rem;
            color: var(--text-main);
            cursor: pointer;
        }

        .checkbox-label input {
            margin-right: 0.5rem;
            margin-top: 0.2rem;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background-color: var(--bg-body);
        }

        .hidden {
            display: none !important;
        }

        #result-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-left: 4px solid #3b82f6;
        }

        .tips-container {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #166534;
        }

        /* NOUS ESTILS PER A LES VINYETES DEL PLA D'ACCIÓ */
        .plan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .plan-card-item {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .plan-card-item h3 {
            font-size: 1.1rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .plan-card-item ul {
            list-style: none;
            padding: 0;
        }

        .plan-card-item li {
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
            padding-left: 1.25rem;
            position: relative;
        }

        .plan-card-item li::before {
            content: "•";
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            position: absolute;
            left: 0;
            top: -2px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Panell de Sostenibilitat ASIX</h1>
        <p>Eina de simulació i projecció estratègica de recursos</p>
    </header>

    <div class="container">
        <div class="card">
            <h2 class="card-title">Simulador de Consum Corrent</h2>
            <p class="card-subtitle">Configuració de variables globals per a l'estimació de despesa</p>

            <div class="grid-controls">
                <div class="control-group">
                    <label class="control-label">Indicador d'Anàlisi</label>
                    <select id="indicator-select" onchange="gestionarFiltres()">
                        <option value="electricitat">Consum Elèctric (kWh)</option>
                        <option value="aigua">Consum d'Aigua (L)</option>
                        <option value="oficina">Material d'Oficina (€)</option>
                        <option value="neteja">Productes de Neteja (€)</option>
                        <option value="manteniment">Manteniment (€)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Període d'Avaluació</label>
                    <select id="period-select">
                        <option value="any">Any Natural (12 mesos)</option>
                        <option value="curs">Curs Escolar (10 mesos)</option>
                    </select>
                </div>

                <div class="control-group" id="ipc-control-group">
                    <label class="control-label">Variació IPC (%)</label>
                    <div class="input-with-suffix">
                        <input type="number" id="ipc-input" step="0.1" value="3.1">
                        <span>%</span>
                    </div>
                </div>

                <div class="control-group" id="solar-control-group">
                    <label class="control-label">Plaques Solars (Extra %)</label>
                    <div class="input-with-suffix">
                        <input type="number" id="solar-input" step="1" min="0" max="100" value="0">
                        <span>%</span>
                    </div>
                </div>

                <div class="control-group" id="water-control-group" style="display: none;">
                    <label class="control-label">Pla d'Eficiència Hídrica</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="chk-aireadores"> Instal·lació d'airejadors d'alta eficiència (-12%)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="chk-cisternas"> Electrovàlvules de tall automàtic (-20%)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="chk-sensores"> Monitorització de fugues IoT (-15%)
                        </label>
                    </div>
                </div>
            </div>

            <button onclick="calcularConsum()">Executar Simulació</button>
        </div>

        <div id="result-box" class="card hidden">
            <h2 class="card-title">Resultats de la Projecció</h2>
            <div id="calc-output" style="margin-top: 1rem;">
            </div>
            <div class="tips-container">
                <strong>Anàlisi: </strong> <span id="tips-box"></span>
            </div>
        </div>

        <div class="card">
            <div class="flex-between" style="margin-bottom: 1rem;">
                <div>
                    <h2 class="card-title">Pla d'Acció de Sostenibilitat</h2>
                    <p class="card-subtitle" style="border: none; padding: 0; margin: 0;">Detall de les mesures estratègiques per àrea</p>
                </div>
                <button class="btn-outline" onclick="aplicarPlaReduccio()">Generar Informe Global</button>
            </div>

            <div id="plan-results" class="hidden">
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
